# TCGA-LUAD methylation cohort — V2.5-sigmoid variant of tcga_luad_v0.yaml.
# Mirrors the V2.5-diff cohort spec exactly (same summaries, same n,
# same provenance) but switches the probabilistic axis to
# tumor_plus_gap_sigmoid. Output:
# data/derived/scored_tcga_luad_wg_sigmoid.jsonl (19,787,820 rows vs
# catalog_hg19_wg.jsonl sha256 d20661c5…).
#
# Atlas-side consumer: the v0.3 release line — see atlas-side
# docs/v25_sigmoid_ingestion_contract.md.
#
# Provenance: same TCGA-LUAD methylation summaries as tcga_luad_v0.yaml
# (data/derived/tcga_luad_summary/, GDC fetched 2026-04-27; n=473 tumor
# files / 458 cases vs 32 adjacent-normal files / 32 cases).

cohort:
  name: TCGA-LUAD-sigmoid
  tumor_dataset: TCGA-LUAD
  normal_dataset: TCGA-LUAD-normal
  platform: HM450
  min_samples_tumor: 30
  min_samples_normal: 10

  # V2.5-sigmoid: probabilistic ranking axis with σ_fixed=√2·σ_floor=0.0707
  # bandwidth and δ=0.2 gap threshold. PAPER.md §5.2.2 documents the
  # tie-band reduction at WG K=100 vs V2.5-diff. LUAD has the smallest
  # matched-normal comparator in the atlas (n=32, just above the
  # p_trust_ramp_n=30 saturation threshold) — sigmoid's tie-band
  # narrowing is most valuable for cohorts of this size.
  probabilistic_mode: tumor_plus_gap_sigmoid
  differential_delta: 0.2
  sigma_fixed: 0.07071067811865475

# Same probe-distance evidence bands as the V2.5-diff config.
evidence_thresholds:
  exact_bp: 0
  proximal_close_bp: 25
  proximal_bp: 50
  regional_bp: 500

# Same penalty weights as V2.5-diff config.
penalties:
  heterogeneity_iqr_threshold: 0.30
  heterogeneity_weight: 0.4
  low_coverage_n_threshold: 30
  low_coverage_weight: 0.3
