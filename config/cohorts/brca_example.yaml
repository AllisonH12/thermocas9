# Example cohort configuration: TCGA Breast Invasive Carcinoma.
# Resolved by a methylation backend (e.g., GDC) at runtime.

cohort:
  name: TCGA-BRCA
  tumor_dataset: TCGA-BRCA
  normal_dataset: TCGA-BRCA-normal
  platform: HM450                  # HM450 | EPIC | RRBS | WGBS
  subtype_field: PAM50             # optional
  min_samples_tumor: 30
  min_samples_normal: 10

  # V2.4/V2.5 — which factors participate in the probabilistic composite.
  #   tumor_only                          : p_sel = p_targ × p_trust (safe default)
  #   tumor_plus_normal_protection        : p_sel = p_targ × p_prot × p_trust
  #   tumor_plus_differential_protection  : p_sel = p_targ × p_diff × p_trust
  #                                         where p_diff = P(β_n − β_t > differential_delta)
  # See README §"Recommended score axis" for guidance. `tumor_only` is the safe
  # default; `tumor_plus_differential_protection` is the V2.5 experimental mode.
  probabilistic_mode: tumor_only

  # V2.5 margin. Only used when probabilistic_mode=tumor_plus_differential_protection.
  differential_delta: 0.2

# Evidence-class boundaries (bp) from the critical PAM cytosine to nearest probe.
# Override per cohort if probe density justifies it.
evidence_thresholds:
  exact_bp: 0                      # distance 0 — probe assays the same CpG
  proximal_close_bp: 25            # probe within 25 bp
  proximal_bp: 50                  # probe within 50 bp
  regional_bp: 500                 # broader local context only

# Penalties applied to candidates with weak data.
penalties:
  heterogeneity_iqr_threshold: 0.30   # IQR(beta_tumor) above this → penalty
  heterogeneity_weight: 0.4
  low_coverage_n_threshold: 30        # fewer than N tumor samples → penalty
  low_coverage_weight: 0.3
